name: build-assets

on:
  push:
    branches: [main, master]
    paths:
      - 'resources/views/**'
      - 'resources/css/**'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'vite.config.js'
  pull_request:
    paths:
      - 'resources/views/**'
      - 'resources/css/**'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'vite.config.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Ensure dist/ is up to date
        run: |
          if [[ -n $(git status --porcelain dist/) ]]; then
            echo "::error::Built assets in dist/ are out of date. Please run 'npm run build' and commit the changes."
            git status dist/
            git diff dist/
            exit 1
          fi
