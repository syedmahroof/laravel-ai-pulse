name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
