<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="coreGrad" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- rounded panel -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#coreGrad)" opacity="0.16"/>
  <rect x="6.75" y="6.75" width="50.5" height="50.5" rx="13.25" fill="none" stroke="url(#coreGrad)" stroke-width="1.5" opacity="0.5"/>
  <!-- analyzer waveform / signal -->
  <path d="M14 38 L22 38 L26 22 L32 46 L38 14 L42 38 L50 38"
        fill="none" stroke="url(#coreGrad)" stroke-width="3.2"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="38" cy="14" r="2.6" fill="#2dd4bf"/>
</svg>
